<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Double ring border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="2.2"/>
  <circle cx="50" cy="50" r="41.5" fill="none" stroke="currentColor" stroke-width="1"/>

  <!-- Network lines -->
  <!-- Main diagonal: bottom-left large node → upper-right area -->
  <line x1="17" y1="76" x2="53" y2="24" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Bottom-left → right large node (second crossing diagonal) -->
  <line x1="17" y1="76" x2="72" y2="47" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Center large → right large (horizontal segment) -->
  <line x1="46" y1="48" x2="72" y2="47" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Center large → upper small node -->
  <line x1="46" y1="48" x2="42" y2="29" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- Upper small → tiny top node -->
  <line x1="42" y1="29" x2="53" y2="24" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- Bottom-left → nearby small mid node -->
  <line x1="17" y1="76" x2="35" y2="67" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="17"  cy="76"  r="4.5" fill="currentColor"/>  <!-- bottom-left, large -->
  <circle cx="46"  cy="48"  r="5"   fill="currentColor"/>  <!-- center, large -->
  <circle cx="72"  cy="47"  r="3.5" fill="currentColor"/>  <!-- right, large -->
  <circle cx="42"  cy="29"  r="2"   fill="currentColor"/>  <!-- upper small -->
  <circle cx="53"  cy="24"  r="1.5" fill="currentColor"/>  <!-- tiny top -->
  <circle cx="35"  cy="67"  r="2"   fill="currentColor"/>  <!-- small mid-left -->
  <circle cx="52"  cy="64"  r="2.5" fill="currentColor"/>  <!-- small lower-center -->

  <!-- RNS text — upper-right quadrant, condensed bold -->
  <text x="52" y="46"
        font-family="Arial Narrow, Arial, sans-serif"
        font-size="13"
        font-weight="700"
        fill="currentColor"
        letter-spacing="1.5">RNS</text>
</svg>
