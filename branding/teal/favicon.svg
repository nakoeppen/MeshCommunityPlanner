<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="peakGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <g id="background">
    <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180" fill="#1E293B"/>
  </g>

  <!-- Secondary connections (barely visible mesh texture) -->
  <g id="secondary-connections" stroke="#14B8A6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.2">
    <!-- (160,480) to M-bottom-left (200,750) -->
    <line x1="160" y1="480" x2="200" y2="750"/>
    <!-- (160,480) to M-top-left (300,240) -->
    <line x1="160" y1="480" x2="300" y2="240"/>
    <!-- (440,340) to M-top-left (300,240) -->
    <line x1="440" y1="340" x2="300" y2="240"/>
    <!-- (440,340) to M-center-valley (512,580) -->
    <line x1="440" y1="340" x2="512" y2="580"/>
    <!-- (600,380) to M-top-right (724,240) -->
    <line x1="600" y1="380" x2="724" y2="240"/>
    <!-- (600,380) to M-center-valley (512,580) -->
    <line x1="600" y1="380" x2="512" y2="580"/>
    <!-- (380,660) to M-bottom-left (200,750) -->
    <line x1="380" y1="660" x2="200" y2="750"/>
    <!-- (380,660) to M-center-valley (512,580) -->
    <line x1="380" y1="660" x2="512" y2="580"/>
    <!-- (680,620) to M-bottom-right (824,750) -->
    <line x1="680" y1="620" x2="824" y2="750"/>
    <!-- (680,620) to M-center-valley (512,580) -->
    <line x1="680" y1="620" x2="512" y2="580"/>
    <!-- (870,420) to M-top-right (724,240) -->
    <line x1="870" y1="420" x2="724" y2="240"/>
    <!-- (870,420) to M-bottom-right (824,750) -->
    <line x1="870" y1="420" x2="824" y2="750"/>
  </g>

  <!-- M connection lines (bold M letterform) -->
  <g id="m-connections" stroke="#14B8A6" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85">
    <!-- Left leg: bottom-left to top-left-peak -->
    <line x1="200" y1="750" x2="300" y2="240"/>
    <!-- Left diagonal: top-left-peak to center-valley -->
    <line x1="300" y1="240" x2="512" y2="580"/>
    <!-- Right diagonal: center-valley to top-right-peak -->
    <line x1="512" y1="580" x2="724" y2="240"/>
    <!-- Right leg: top-right-peak to bottom-right -->
    <line x1="724" y1="240" x2="824" y2="750"/>
  </g>

  <!-- Secondary nodes (subtle background mesh) -->
  <g id="secondary-nodes" fill="#F59E0B">
    <circle cx="160" cy="480" r="14" opacity="0.25"/>
    <circle cx="440" cy="340" r="16" opacity="0.3"/>
    <circle cx="600" cy="380" r="14" opacity="0.25"/>
    <circle cx="380" cy="660" r="15" opacity="0.28"/>
    <circle cx="680" cy="620" r="14" opacity="0.25"/>
    <circle cx="870" cy="420" r="16" opacity="0.3"/>
  </g>

  <!-- M nodes (primary) -->
  <g id="m-nodes">
    <!-- Bottom-left -->
    <circle cx="200" cy="750" r="35" fill="#F59E0B"/>
    <!-- Top-left peak (largest, with glow) -->
    <circle cx="300" cy="240" r="45" fill="url(#peakGlow)"/>
    <!-- Center valley (smallest M node) -->
    <circle cx="512" cy="580" r="28" fill="#F59E0B"/>
    <!-- Top-right peak (largest, with glow) -->
    <circle cx="724" cy="240" r="45" fill="url(#peakGlow)"/>
    <!-- Bottom-right -->
    <circle cx="824" cy="750" r="35" fill="#F59E0B"/>
  </g>
</svg>
