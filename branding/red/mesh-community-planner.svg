<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="peak-glow-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <g id="background">
    <rect width="1024" height="1024" rx="180" fill="#1C1917"/>
  </g>

  <!-- Secondary connections -->
  <g id="secondary-connections" stroke="#E11D48" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.2" fill="none">
    <line x1="160" y1="480" x2="200" y2="750"/>
    <line x1="160" y1="480" x2="300" y2="240"/>
    <line x1="440" y1="340" x2="300" y2="240"/>
    <line x1="440" y1="340" x2="512" y2="580"/>
    <line x1="600" y1="380" x2="724" y2="240"/>
    <line x1="600" y1="380" x2="512" y2="580"/>
    <line x1="380" y1="660" x2="200" y2="750"/>
    <line x1="380" y1="660" x2="512" y2="580"/>
    <line x1="680" y1="620" x2="824" y2="750"/>
    <line x1="680" y1="620" x2="512" y2="580"/>
    <line x1="870" y1="420" x2="724" y2="240"/>
    <line x1="870" y1="420" x2="824" y2="750"/>
  </g>

  <!-- M connection lines -->
  <g id="m-connections" stroke="#E11D48" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" fill="none">
    <line x1="200" y1="750" x2="300" y2="240"/>
    <line x1="300" y1="240" x2="512" y2="580"/>
    <line x1="512" y1="580" x2="724" y2="240"/>
    <line x1="724" y1="240" x2="824" y2="750"/>
  </g>

  <!-- Secondary nodes -->
  <g id="secondary-nodes">
    <circle cx="160" cy="480" r="14" fill="#EF4444" opacity="0.25"/>
    <circle cx="440" cy="340" r="16" fill="#EF4444" opacity="0.3"/>
    <circle cx="600" cy="380" r="14" fill="#EF4444" opacity="0.25"/>
    <circle cx="380" cy="660" r="15" fill="#EF4444" opacity="0.28"/>
    <circle cx="680" cy="620" r="14" fill="#EF4444" opacity="0.25"/>
    <circle cx="870" cy="420" r="16" fill="#EF4444" opacity="0.3"/>
  </g>

  <!-- M nodes -->
  <g id="m-nodes">
    <circle cx="200" cy="750" r="35" fill="#EF4444"/>
    <circle cx="300" cy="240" r="45" fill="url(#peak-glow-red)"/>
    <circle cx="512" cy="580" r="28" fill="#EF4444"/>
    <circle cx="724" cy="240" r="45" fill="url(#peak-glow-red)"/>
    <circle cx="824" cy="750" r="35" fill="#EF4444"/>
  </g>
</svg>
